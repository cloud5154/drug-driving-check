<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>毒駕取締執法檢核表</title>
<style>
  :root {
    --green: #1a7a57;
    --green-light: #e6f5ef;
    --green-mid: #2fa876;
    --amber: #b85c00;
    --amber-light: #fff3e0;
    --red: #c0392b;
    --red-light: #fdecea;
    --blue: #1a5fa8;
    --blue-light: #e8f0fb;
    --gray: #4a4a4a;
    --gray-light: #f5f5f3;
    --border: #ddd;
    --text: #1a1a1a;
    --text2: #555;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: #f0f2f0;
    color: var(--text);
    min-height: 100vh;
  }
  .top-bar {
    background: var(--green);
    color: #fff;
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .top-bar-icon {
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .top-bar-text h1 { font-size: 15px; font-weight: 600; }
  .top-bar-text p { font-size: 11px; opacity: 0.75; margin-top: 1px; }
  .progress-wrap {
    background: var(--green);
    padding: 0 16px 12px;
  }
  .progress-track {
    background: rgba(255,255,255,0.25);
    border-radius: 3px; height: 4px;
  }
  .progress-fill {
    background: #fff;
    height: 4px; border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 11px; color: rgba(255,255,255,0.8);
    margin-top: 5px; text-align: right;
  }
  .content { padding: 14px 14px 80px; max-width: 520px; margin: 0 auto; }
  .phase-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.05em;
    padding: 4px 10px; border-radius: 20px;
    margin-bottom: 8px;
  }
  .phase-badge.observe { background: var(--green-light); color: var(--green); }
  .phase-badge.test { background: var(--blue-light); color: var(--blue); }
  .phase-badge.arrest { background: var(--red-light); color: var(--red); }
  .phase-badge.urine { background: #f3e8ff; color: #6b21a8; }
  .phase-badge.done { background: var(--gray-light); color: var(--gray); }

  .card {
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .card.done-card { opacity: 0.6; }
  .card-head {
    padding: 13px 14px 0;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .card-num {
    width: 24px; height: 24px; min-width: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    background: var(--gray-light); color: var(--gray);
    margin-top: 1px;
  }
  .card-num.active { background: var(--green); color: #fff; }
  .card-num.done { background: var(--green-light); color: var(--green); }
  .card-title { font-size: 15px; font-weight: 600; line-height: 1.4; flex: 1; }
  .card-desc { font-size: 13px; color: var(--text2); margin: 6px 14px 0 48px; line-height: 1.6; }
  .law-tags { display: flex; flex-wrap: wrap; gap: 5px; margin: 7px 14px 0 48px; }
  .law-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: var(--blue-light); color: var(--blue);
    border: 1px solid #b3cff0;
  }
  .btn-group { padding: 10px 14px 13px 14px; display: flex; flex-direction: column; gap: 7px; }
  .opt-btn {
    width: 100%; padding: 11px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: #fff; color: var(--text);
    font-size: 14px; font-family: inherit;
    text-align: left; cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .opt-btn:active { transform: scale(0.98); }
  .opt-btn.go { border-color: var(--green); background: var(--green-light); color: var(--green); font-weight: 500; }
  .opt-btn.stop { border-color: var(--red); background: var(--red-light); color: var(--red); font-weight: 500; }
  .opt-btn.warn { border-color: var(--amber); background: var(--amber-light); color: var(--amber); font-weight: 500; }
  .opt-btn .dot {
    width: 8px; height: 8px; min-width: 8px; border-radius: 50%;
    background: currentColor; opacity: 0.5;
  }
  .chosen-row {
    padding: 0 14px 12px 48px;
    font-size: 13px; color: var(--green);
    display: flex; align-items: center; gap: 6px;
  }

  .info-box {
    margin: 0 14px 12px 14px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px; line-height: 1.6;
  }
  .info-box.green { background: var(--green-light); color: #0d4a35; border-left: 3px solid var(--green); }
  .info-box.amber { background: var(--amber-light); color: #6b3300; border-left: 3px solid #e07800; }
  .info-box.red { background: var(--red-light); color: #7b1a14; border-left: 3px solid var(--red); }
  .info-box.blue { background: var(--blue-light); color: #0d3a70; border-left: 3px solid var(--blue); }

  .outcome-card {
    background: #fff;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    margin-bottom: 10px; overflow: hidden;
  }
  .outcome-head {
    padding: 11px 14px;
    font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .outcome-card.green .outcome-head { background: var(--green-light); color: var(--green); border-bottom: 1px solid #b3deca; }
  .outcome-card.amber .outcome-head { background: var(--amber-light); color: var(--amber); border-bottom: 1px solid #f0c070; }
  .outcome-card.gray .outcome-head { background: var(--gray-light); color: var(--gray); border-bottom: 1px solid #ccc; }
  .outcome-card.red .outcome-head { background: var(--red-light); color: var(--red); border-bottom: 1px solid #f0b0a8; }
  .outcome-body { padding: 10px 14px; }
  .chk-item {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 13px; color: var(--text2);
    padding: 4px 0; line-height: 1.5;
  }
  .chk-item::before { content: "□"; font-size: 15px; min-width: 16px; margin-top: -1px; }
  .chk-item.done-item::before { content: "☑"; color: var(--green); }

  .divider {
    height: 1px; background: var(--border);
    margin: 12px 0;
  }
  .reset-wrap { display: flex; justify-content: center; gap: 10px; padding: 8px 0 4px; }
  .reset-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 20px; padding: 7px 18px;
    font-size: 13px; color: var(--text2);
    cursor: pointer; font-family: inherit;
  }
  .back-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 20px; padding: 7px 18px;
    font-size: 13px; color: var(--text2);
    cursor: pointer; font-family: inherit;
  }
  .back-btn:disabled { opacity: 0.35; cursor: default; }
  .step-counter {
    font-size: 12px; color: rgba(255,255,255,0.75);
    margin-left: auto;
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-icon">🛡</div>
  <div class="top-bar-text">
    <h1>毒駕取締執法檢核表</h1>
    <p>警署刑毒緝字第1150006494號</p>
  </div>
</div>
<div class="progress-wrap">
  <div class="progress-track">
    <div class="progress-fill" id="prog" style="width:0%"></div>
  </div>
  <div class="progress-label" id="prog-label">尚未開始</div>
</div>

<div class="content" id="main"></div>

<script>
const C = {};
const HISTORY = [];

function choose(k, v) {
  HISTORY.push(k);
  C[k] = v;
  render();
  setTimeout(() => {
    const donecards = document.querySelectorAll('.card.done-card');
    const lastDone = donecards[donecards.length - 1];
    if (lastDone) {
      const bottom = lastDone.getBoundingClientRect().bottom + window.scrollY;
      window.scrollTo({ top: bottom - 20, behavior: 'smooth' });
    }
  }, 80);
}

function goBack() {
  if (HISTORY.length === 0) return;
  const lastKey = HISTORY.pop();
  delete C[lastKey];
  render();
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function reset() {
  Object.keys(C).forEach(k => delete C[k]);
  HISTORY.length = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function phaseBadge(type, label) {
  return `<div class="phase-badge ${type}">${label}</div>`;
}

function card(key, num, title, desc, laws, opts, notice) {
  const done = C[key] !== undefined;
  const chosen = done ? opts.find(o => o.k === C[key]) : null;
  let html = `<div class="card ${done ? 'done-card' : ''}">`;
  html += `<div class="card-head">
    <div class="card-num ${done ? 'done' : 'active'}">${done ? '✓' : num}</div>
    <div class="card-title">${title}</div>
  </div>`;
  if (desc) html += `<p class="card-desc">${desc}</p>`;
  if (laws && laws.length) {
    html += `<div class="law-tags">${laws.map(l => `<span class="law-tag">${l}</span>`).join('')}</div>`;
  }
  if (notice) {
    html += `<div style="margin: 8px 14px 0 14px; padding: 9px 12px; border-radius: 8px; background: #e8f0fb; border-left: 3px solid #1a5fa8; font-size: 12px; color: #0d3a70; line-height: 1.6;">${notice}</div>`;
  }
  if (done) {
    html += `<div class="chosen-row">✓ ${chosen ? chosen.label : C[key]}</div>`;
  } else {
    html += `<div class="btn-group">`;
    opts.forEach(o => {
      html += `<button class="opt-btn ${o.style || ''}" onclick="choose('${key}','${o.k}')">
        <span class="dot"></span>${o.label}
      </button>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function infoBox(type, msg) {
  return `<div class="info-box ${type}">${msg}</div>`;
}

function outcomeCard(type, icon, title, items) {
  return `<div class="outcome-card ${type}">
    <div class="outcome-head">${icon} ${title}</div>
    <div class="outcome-body">${items.map(i => `<div class="chk-item">${i}</div>`).join('')}</div>
  </div>`;
}

function docChecklist() {
  return `<div class="outcome-card green">
    <div class="outcome-head">📋 應備文件清單</div>
    <div class="outcome-body">
      <div class="chk-item">工作紀錄簿</div>
      <div class="chk-item">附表一：觀測紀錄表</div>
      <div class="chk-item">附表二：執法紀錄表</div>
      <div class="chk-item">附表三：唾篩同意書</div>
      <div class="chk-item">警詢筆錄</div>
      <div class="chk-item">刑案陳報單（如逮捕）</div>
      <div class="chk-item">逕行逮捕通知書（如逮捕）</div>
      <div class="chk-item">扣押物清單（如查獲毒品）</div>
    </div>
  </div>`;
}

function render() {
  let html = '';
  let steps = 0, done = 0;

  // 步驟一：觸發情況
  steps++;
  if (C.trigger) done++;
  html += phaseBadge('observe', '階段一：觀察研判');
  html += card('trigger', 1, '觀察到哪種情況？',
    '攔查車輛或處理車禍時，依警察職權行使法執行。',
    ['警察職權行使法'],
    [
      { k: 'vehicle', label: '🚗 駕駛行為異常（蛇行、突停、無視號誌）', style: 'warn' },
      { k: 'symptom', label: '👁 駕駛人有疑似毒品徵候', style: 'warn' },
      { k: 'drug_found', label: '💊 車內發現疑似毒品或施用器具', style: 'stop' },
      { k: 'accident', label: '🚨 車禍肇事，疑似毒駕', style: 'stop' },
      { k: 'none', label: '✅ 無上述情形，人車放行', style: 'go' }
    ]
  );

  if (!C.trigger) { updateProgress(done, steps); document.getElementById('main').innerHTML = html + resetBtn(); return; }

  if (C.trigger === 'none') {
    html += outcomeCard('gray', '✅', '無異常，繼續執勤', ['人車放行', '填寫工作紀錄簿']);
    updateProgress(6, 6); document.getElementById('main').innerHTML = html + resetBtn(); return;
  }

  // 步驟二：觀察徵候
  steps++;
  if (C.observe) done++;
  html += card('observe', 2, '目視觀察：是否有施用毒品徵候？',
    '注意力不集中、情緒不穩、視聽幻覺、發抖、語無倫次、呆滯等。符合徵候者才可實施唾液毒品檢測。',
    null,
    [
      { k: 'yes', label: '✓ 有明顯徵候，符合實施快篩條件', style: 'warn' },
      { k: 'no', label: '✗ 無明顯徵候', style: '' }
    ]
  );

  if (!C.observe) { updateProgress(done, steps); document.getElementById('main').innerHTML = html + resetBtn(); return; }

  if (C.observe === 'no') {
    steps++;
    if (C.admit) done++;
    html += card('admit', 3, '探詢駕駛人：駕車前是否施用毒品？',
      '直接口頭詢問當事人。',
      null,
      [
        { k: 'yes', label: '坦承曾施用毒品', style: 'warn' },
        { k: 'no', label: '否認，且無其他事證', style: 'go' }
      ]
    );
    if (!C.admit) { updateProgress(done, steps); document.getElementById('main').innerHTML = html + resetBtn(); return; }
    if (C.admit === 'no') {
      html += outcomeCard('gray', '✅', '無毒駕事證，人車放行', ['無需後續處置', '填寫工作紀錄簿']);
      updateProgress(6, 6); document.getElementById('main').innerHTML = html + resetBtn(); return;
    }
  }

  // 唾液快篩階段
  html += `<div class="divider"></div>`;
  html += phaseBadge('test', '階段二：唾液快篩');

  steps++;
  if (C.consent_test) done++;
  html += card('consent_test', C.observe === 'no' ? 3 : 3, '駕駛人是否配合唾液快篩？',
    '請駕駛人簽署「自願受採集唾液同意書」(附表三)。',
    ['道交條例§35', '刑事訴訟法§88'],
    [
      { k: 'yes', label: '✓ 同意接受檢測並簽署同意書', style: 'go' },
      { k: 'refuse', label: '✗ 拒絕接受檢測', style: 'stop' }
    ],
    '⚠️ 全程連續錄影。告知稽查事由、流程（產品有效期限、判讀方式）。測試前請駕駛人漱口，等待<strong>10分鐘</strong>後開始。同一駕駛人最多實施<strong>2次</strong>。'
  );

  if (!C.consent_test) { updateProgress(done, steps); document.getElementById('main').innerHTML = html + resetBtn(); return; }

  if (C.consent_test === 'refuse') {
    html += infoBox('red', '🚨 <strong>拒測立即處置：</strong>依道交條例§35當場舉發、移置保管車輛、吊銷駕照。請駕駛人在執法紀錄表「拒絕接受檢測」欄位簽名。');
    steps++;
    if (C.safe_driving) done++;
    html += card('safe_driving', 4, '客觀情狀是否足認不能安全駕駛？',
      '判斷唾液或尿液檢測可能呈現毒品反應（精神狀態、行為表現等）。',
      ['刑事訴訟法§88'],
      [
        { k: 'yes', label: '✓ 有客觀情狀足認不能安全駕駛', style: 'warn' },
        { k: 'no', label: '✗ 無，人員放行', style: 'go' }
      ]
    );
    if (!C.safe_driving) { updateProgress(done, steps); document.getElementById('main').innerHTML = html + resetBtn(); return; }
    if (C.safe_driving === 'no') {
      html += outcomeCard('gray', '✅', '無客觀不安全情狀，人員放行', ['填寫工作紀錄簿']);
      updateProgress(6, 6); document.getElementById('main').innerHTML = html + resetBtn(); return;
    }
    // 有客觀情狀 → 逮捕
    html += `<div class="divider"></div>`;
    html += phaseBadge('arrest', '階段三：逮捕移送');
    html += infoBox('red', '🚨 依刑事訴訟法§88現行犯或準現行犯逮捕。<strong>務必全程連續錄影</strong>，詳實記錄駕駛人精神狀態（語無倫次、肌肉顫抖等）於筆錄及觀測表。');
    html += outcomeCard('amber', '📋', '立即處置事項', [
      '帶返駐地製作警詢筆錄',
      '填寫觀測表（附表一）',
      '依道交條例§35當場舉發（如尚未舉發）'
    ]);
    steps++;
    if (C.consent_urine) done++;
    html += card('consent_urine', 5, '探詢是否接受尿液採驗',
      '帶返駐地後詢問。',
      ['刑事訴訟法§205-2'],
      [
        { k: 'yes', label: '✓ 同意接受尿液採驗', style: 'go' },
        { k: 'no', label: '✗ 拒絕，需報請檢察官', style: 'stop' }
      ]
    );
    if (!C.consent_urine) { updateProgress(done, steps); document.getElementById('main').innerHTML = html + resetBtn(); return; }
    goToUrine(html, done, steps);
    return;
  }

  // 同意快篩 → 查看結果
  steps++;
  if (C.test_result) done++;
  html += card('test_result', 4, '唾液快篩結果',
    '判讀時間內確認結果，立即拍照記錄，請受檢人於執法紀錄表確認簽名（附表二）。',
    ['附表二：執法紀錄表'],
    [
      { k: 'positive', label: '🔴 陽性反應', style: 'stop' },
      { k: 'negative', label: '🟢 陰性反應，放行', style: 'go' },
      { k: 'fail', label: '⚠️ 檢測失敗（唾液不足等）', style: 'warn' }
    ]
  );

  if (!C.test_result) { updateProgress(done, steps); document.getElementById('main').innerHTML = html + resetBtn(); return; }

  if (C.test_result === 'negative') {
    html += outcomeCard('gray', '✅', '唾液陰性，人車放行', ['填寫工作紀錄簿', '告知當事人檢測結果']);
    updateProgress(6, 6); document.getElementById('main').innerHTML = html + resetBtn(); return;
  }

  if (C.test_result === 'fail') {
    html += infoBox('amber', '⚠️ 向當事人說明檢測失敗原因，請其配合改採尿液檢測。');
    steps++;
    if (C.urine_instead) done++;
    html += card('urine_instead', 5, '改採驗尿液？',
      null, ['刑事訴訟法§205-1'],
      [
        { k: 'yes', label: '✓ 同意採驗尿液', style: 'go' },
        { k: 'no', label: '✗ 拒絕，依程序辦理', style: 'stop' }
      ]
    );
    if (!C.urine_instead) { updateProgress(done, steps); document.getElementById('main').innerHTML = html + resetBtn(); return; }
    if (C.urine_instead === 'no') {
      html += infoBox('amber', '依注意事項第九點：報請檢察官核發採集尿液鑑定許可書辦理。');
    }
    html += `<div class="divider"></div>`;
    html += phaseBadge('urine', '階段四：採驗尿液');
    goToUrineResult(html, done, steps);
    return;
  }

  // 陽性
  html += `<div class="divider"></div>`;
  html += phaseBadge('arrest', '階段三：逮捕移送');
  html += infoBox('red', '🚨 <strong>唾液陽性立即處置：</strong>告知檢測結果，依道交條例§35當場舉發、移置保管車輛、吊扣駕照及車輛牌照。');
  html += outcomeCard('red', '🚨', '依刑事訴訟法§88逮捕', [
    '現行犯或準現行犯逮捕',
    '帶返駐地製作警詢筆錄',
    '填寫觀測表（附表一）',
    '請駕駛人於執法紀錄表確認簽名'
  ]);

  steps++;
  if (C.consent_urine) done++;
  html += card('consent_urine', 5, '探詢是否接受尿液採驗',
    '帶返駐地後詢問。',
    ['刑事訴訟法§205-2'],
    [
      { k: 'yes', label: '✓ 同意接受尿液採驗', style: 'go' },
      { k: 'no', label: '✗ 拒絕，需報請檢察官', style: 'stop' }
    ]
  );

  if (!C.consent_urine) { updateProgress(done, steps); document.getElementById('main').innerHTML = html + resetBtn(); return; }

  html += `<div class="divider"></div>`;
  html += phaseBadge('urine', '階段四：採驗尿液');

  if (C.consent_urine === 'no') {
    html += infoBox('amber', '⚠️ 報請檢察官核發「採集尿液鑑定許可書」（刑訴§205-2）。如有急迫情況無法及時保全證據，得逕行採取，並於<strong>24小時內</strong>補報檢察官許可。');
  } else {
    html += infoBox('green', '✅ 填寫採尿同意書 → 以非侵入方式採集尿液 → 製作警詢筆錄及觀測表。');
  }

  goToUrineResult(html, done, steps);
  return;

  function goToUrine(h, d, s) {
    h += `<div class="divider"></div>`;
    h += phaseBadge('urine', '階段四：採驗尿液');
    if (C.consent_urine === 'no') {
      h += infoBox('amber', '⚠️ 報請檢察官核發「採集尿液鑑定許可書」（刑訴§205-2）。急迫情況得逕行採取，<strong>24小時內</strong>補報。');
    } else {
      h += infoBox('green', '✅ 填寫採尿同意書 → 以非侵入方式採集尿液 → 製作警詢筆錄及觀測表。');
    }
    goToUrineResult(h, d, s);
  }

  function goToUrineResult(h, d, s) {
    s++;
    if (C.urine_result) d++;
    h += card('urine_result', 6, '尿液確認檢驗報告結果',
      '偵查隊收受報告後，函報該管地檢署，並將卷證會辦查獲機關之交通權責單位。',
      ['刑法§185-3(1)④', '道交條例§35(1)②'],
      [
        { k: 'positive', label: '🔴 有毒品濃度數值', style: 'stop' },
        { k: 'negative', label: '🟢 無毒品濃度數值', style: 'go' }
      ]
    );

    if (!C.urine_result) { updateProgress(d, s); document.getElementById('main').innerHTML = h + resetBtn(); return; }

    h += `<div class="divider"></div>`;
    h += phaseBadge('done', '處理完成');

    if (C.urine_result === 'positive') {
      h += outcomeCard('red', '⚖️', '依刑法§185-3(1)④移送法辦', [
        '移（函）送檢察官偵辦「施用毒品致不能安全駕駛罪」',
        '附執法紀錄表、警詢筆錄、觀測表等事證',
        '交通權責單位確認§35舉發情形，未舉發者依職權補發',
        '尿液確認報告留存備查'
      ]);
    } else {
      h += outcomeCard('amber', '📋', '無毒品數值，撤銷舉發', [
        '原舉發單位撤銷道交條例§35(1)②之舉發',
        '仍函送尿液報告至地檢署完備程序',
        '相關卷證留存備查'
      ]);
    }
    h += docChecklist();
    updateProgress(6, 6);
    document.getElementById('main').innerHTML = h + resetBtn();
  }
}

function goToUrineResult(h, d, s) {
  s++;
  if (C.urine_result) d++;
  h += card('urine_result', 6, '尿液確認檢驗報告結果',
    '偵查隊收受報告後，函報該管地檢署，並將卷證會辦查獲機關之交通權責單位。',
    ['刑法§185-3(1)④', '道交條例§35(1)②'],
    [
      { k: 'positive', label: '🔴 有毒品濃度數值', style: 'stop' },
      { k: 'negative', label: '🟢 無毒品濃度數值', style: 'go' }
    ]
  );

  if (!C.urine_result) { updateProgress(d, s); document.getElementById('main').innerHTML = h + resetBtn(); return; }

  h += `<div class="divider"></div>`;
  h += phaseBadge('done', '處理完成');

  if (C.urine_result === 'positive') {
    h += outcomeCard('red', '⚖️', '依刑法§185-3(1)④移送法辦', [
      '移（函）送檢察官偵辦「施用毒品致不能安全駕駛罪」',
      '附執法紀錄表、警詢筆錄、觀測表等事證',
      '交通權責單位確認§35舉發情形，未舉發者依職權補發',
      '尿液確認報告留存備查'
    ]);
  } else {
    h += outcomeCard('amber', '📋', '無毒品數值，撤銷舉發', [
      '原舉發單位撤銷道交條例§35(1)②之舉發',
      '仍函送尿液報告至地檢署完備程序',
      '相關卷證留存備查'
    ]);
  }
  h += docChecklist();
  updateProgress(6, 6);
  document.getElementById('main').innerHTML = h + resetBtn();
}

function resetBtn() {
  const canBack = HISTORY.length > 0;
  return `<div class="reset-wrap">
    <button class="back-btn" onclick="goBack()" ${canBack ? '' : 'disabled'}>◀ 上一步</button>
    <button class="reset-btn" onclick="reset()">🔄 重新開始</button>
  </div>`;
}

function updateProgress(done, total) {
  const pct = total > 0 ? Math.round(done / 6 * 100) : 0;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-label').textContent = done >= 6 ? '處理完成 ✓' : `進度 ${done}／6 步`;
}

render();
</script>
</body>
</html>
